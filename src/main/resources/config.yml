# ============================================================
#   EnchantForge - Enchantment Modifier Configuration
#   Compatible with Paper 1.21.10
#
#   damage_multiplier: final damage *= value per enchant level
#     > 1.0 = buff   (e.g. 1.10 = +10% per level)
#     < 1.0 = nerf   (e.g. 0.97 = -3%  per level)
#     = 1.0 = vanilla (no change)
#
#   banned: true = blocks item use entirely and notifies player
#   enabled: false = EnchantForge ignores this enchantment
# ============================================================

