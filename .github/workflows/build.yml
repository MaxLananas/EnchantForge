name: Build EnchantForge

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar not found, generating it..."
            gradle wrapper --gradle-version 8.11.1
          else
            echo "gradle-wrapper.jar already present."
          fi

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Verify artifact
        run: |
          FILE=$(ls build/libs/EnchantForge-*.jar 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "Build artifact not found!" && exit 1
          fi
          SIZE=$(du -sh "$FILE" | cut -f1)
          echo "Artifact: $FILE ($SIZE)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnchantForge-${{ github.ref_name }}-${{ github.sha }}
          path: build/libs/EnchantForge-*.jar
          retention-days: 30

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/EnchantForge-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
