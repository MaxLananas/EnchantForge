name: Generate Changelog & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.2.0)'
        required: true
        default: 'v1.0.0'
      from_ref:
        description: 'Start commit/tag (leave empty = previous tag)'
        required: false
        default: ''
      output_format:
        description: 'Changelog format'
        required: true
        default: 'markdown'
        type: choice
        options:
          - markdown
          - json

jobs:
  release:
    name: Build, Changelog & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java & Gradle setup ───────────────────────────────────────────────

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar not found — generating..."
            gradle wrapper --gradle-version 8.11.1
          fi

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Verify build artifact
        id: artifact
        run: |
          FILE=$(ls build/libs/EnchantForge-*.jar 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "Build artifact not found!" && exit 1
          fi
          SIZE=$(du -sh "$FILE" | cut -f1)
          echo "file=$FILE"   >> $GITHUB_OUTPUT
          echo "size=$SIZE"   >> $GITHUB_OUTPUT
          echo "Artifact ready: $FILE ($SIZE)"

      # ── Resolve git range ─────────────────────────────────────────────────

      - name: Resolve git refs
        id: refs
        run: |
          TO=$(git rev-parse HEAD)

          FROM="${{ github.event.inputs.from_ref }}"
          if [ -z "$FROM" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              FROM=$(git rev-parse "${PREV_TAG}")
              echo "Auto-detected previous tag: ${PREV_TAG}"
            else
              FROM=$(git rev-list --max-parents=0 HEAD)
              echo "No previous tag found — using first commit."
            fi
          fi

          TOTAL=$(git rev-list --count "${FROM}..${TO}")

          echo "from=$FROM"   >> $GITHUB_OUTPUT
          echo "to=$TO"       >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Range: ${FROM:0:7} → ${TO:0:7} (${TOTAL} commits)"

      # ── Generate Markdown changelog ───────────────────────────────────────

      - name: Generate Markdown changelog
        if: ${{ github.event.inputs.output_format == 'markdown' }}
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"
          TOTAL="${{ steps.refs.outputs.total }}"
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          {
            echo "# EnchantForge ${VERSION} — Changelog"
            echo ""
            echo "> **Released:** ${DATE}"
            echo "> **Range:** \`${FROM:0:7}\` → \`${TO:0:7}\` · **${TOTAL} commits**"
            echo ""
          } > changelog.md

          declare -A LABELS=(
            [feat]="✨ Features"
            [fix]="🐛 Bug Fixes"
            [perf]="⚡ Performance"
            [refactor]="🔨 Refactoring"
            [docs]="📚 Documentation"
            [chore]="🔧 Maintenance"
            [ci]="⚙️ CI/CD"
            [other]="📦 Other"
          )

          for TYPE in feat fix perf refactor docs chore ci other; do
            if [ "$TYPE" = "other" ]; then
              COMMITS=$(git log "${FROM}..${TO}" \
                --pretty=format:"- **%s** (\`%h\`) — *%an*" \
                --grep="^feat\|^fix\|^perf\|^refactor\|^docs\|^chore\|^ci" \
                --invert-grep 2>/dev/null || true)
            else
              COMMITS=$(git log "${FROM}..${TO}" \
                --pretty=format:"- **%s** (\`%h\`) — *%an*" \
                --grep="^${TYPE}" 2>/dev/null || true)
            fi

            if [ -n "$COMMITS" ]; then
              {
                echo "## ${LABELS[$TYPE]}"
                echo ""
                echo "$COMMITS"
                echo ""
              } >> changelog.md
            fi
          done

          {
            echo "---"
            echo "_Total commits: **${TOTAL}**_"
          } >> changelog.md

          cat changelog.md

      # ── Generate JSON changelog ───────────────────────────────────────────

      - name: Generate JSON changelog
        if: ${{ github.event.inputs.output_format == 'json' }}
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"

          git log "${FROM}..${TO}" \
            --pretty=format:'{"hash":"%H","short":"%h","author":"%an","email":"%ae","date":"%ai","subject":"%s"}' \
            | jq -s '{
                version: "${{ github.event.inputs.version }}",
                generated: now | todate,
                total: length,
                commits: .
              }' > changelog.json

          cat changelog.json

      # ── Create git tag ────────────────────────────────────────────────────

      - name: Create and push git tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists — skipping tag creation."
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
            echo "Tag ${VERSION} created and pushed."
          fi

      # ── GitHub Release with JAR + changelog ──────────────────────────────

      - name: Create GitHub Release (Markdown)
        if: ${{ github.event.inputs.output_format == 'markdown' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "EnchantForge ${{ github.event.inputs.version }}"
          body_path: changelog.md
          files: |
            ${{ steps.artifact.outputs.file }}
            changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (JSON)
        if: ${{ github.event.inputs.output_format == 'json' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "EnchantForge ${{ github.event.inputs.version }}"
          body: |
            ## EnchantForge ${{ github.event.inputs.version }}
            
            See attached `changelog.json` for the full structured commit history.
            
            **Commits in this release:** ${{ steps.refs.outputs.total }}
          files: |
            ${{ steps.artifact.outputs.file }}
            changelog.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Job summary ───────────────────────────────────────────────────────

      - name: Write job summary
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"
          {
            echo "## ✅ Release ${{ github.event.inputs.version }} published"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${{ github.event.inputs.version }}\` |"
            echo "| Format | \`${{ github.event.inputs.output_format }}\` |"
            echo "| From | \`${FROM:0:7}\` |"
            echo "| To | \`${TO:0:7}\` |"
            echo "| Commits | **${{ steps.refs.outputs.total }}** |"
            echo "| Artifact | \`${{ steps.artifact.outputs.file }}\` (${{ steps.artifact.outputs.size }}) |"
          } >> $GITHUB_STEP_SUMMARY
