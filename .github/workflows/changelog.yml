name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      from_ref:
        description: 'Start commit/tag (leave empty = first commit)'
        required: false
        default: ''
      to_ref:
        description: 'End commit/tag (leave empty = HEAD)'
        required: false
        default: 'HEAD'
      output_format:
        description: 'Output format'
        required: true
        default: 'markdown'
        type: choice
        options:
          - markdown
          - json

jobs:
  changelog:
    name: Generate Commit Changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git refs
        id: refs
        run: |
          TO="${{ github.event.inputs.to_ref }}"
          FROM="${{ github.event.inputs.from_ref }}"

          [ -z "$TO" ] || [ "$TO" = "HEAD" ] && TO=$(git rev-parse HEAD)
          [ -z "$FROM" ] && FROM=$(git rev-list --max-parents=0 HEAD)

          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "to=$TO"     >> $GITHUB_OUTPUT
          echo "Changelog range: ${FROM:0:7} → ${TO:0:7}"

      - name: Generate Markdown changelog
        if: ${{ github.event.inputs.output_format == 'markdown' }}
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          TOTAL=$(git rev-list --count "${FROM}..${TO}")

          {
            echo "# EnchantForge — Changelog"
            echo ""
            echo "> Generated: ${DATE}"
            echo "> Range: \`${FROM:0:7}\` → \`${TO:0:7}\` · **${TOTAL} commits**"
            echo ""
          } > changelog.md

          declare -A LABELS=(
            [feat]="✨ Features"
            [fix]="🐛 Bug Fixes"
            [perf]="⚡ Performance"
            [refactor]="🔨 Refactoring"
            [docs]="📚 Documentation"
            [chore]="🔧 Maintenance"
            [ci]="⚙️ CI/CD"
            [other]="📦 Other"
          )

          for TYPE in feat fix perf refactor docs chore ci other; do
            if [ "$TYPE" = "other" ]; then
              COMMITS=$(git log "${FROM}..${TO}" \
                --pretty=format:"- **%s** (\`%h\`) — *%an*" \
                --grep="^feat\|^fix\|^perf\|^refactor\|^docs\|^chore\|^ci" \
                --invert-grep 2>/dev/null || true)
            else
              COMMITS=$(git log "${FROM}..${TO}" \
                --pretty=format:"- **%s** (\`%h\`) — *%an*" \
                --grep="^${TYPE}" 2>/dev/null || true)
            fi

            if [ -n "$COMMITS" ]; then
              {
                echo "## ${LABELS[$TYPE]}"
                echo ""
                echo "$COMMITS"
                echo ""
              } >> changelog.md
            fi
          done

          echo "---" >> changelog.md
          echo "_Total commits in range: **${TOTAL}**_" >> changelog.md
          cat changelog.md

      - name: Generate JSON changelog
        if: ${{ github.event.inputs.output_format == 'json' }}
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"

          {
            echo "["
            git log "${FROM}..${TO}" \
              --pretty=format:'  {"hash":"%H","short":"%h","author":"%an","email":"%ae","date":"%ai","subject":"%s"},'
            echo ""
            echo "]"
          } | sed '/^\[/{n;s/^$/]/;q}; /\]/{x;s/,\n\]$/\n]/;p;d}' > changelog_raw.json

          git log "${FROM}..${TO}" \
            --pretty=format:'{"hash":"%H","short":"%h","author":"%an","email":"%ae","date":"%ai","subject":"%s"}' \
            | jq -s '.' > changelog.json

          cat changelog.json

      - name: Upload Markdown artifact
        if: ${{ github.event.inputs.output_format == 'markdown' }}
        uses: actions/upload-artifact@v4
        with:
          name: changelog-markdown-${{ github.run_id }}
          path: changelog.md
          retention-days: 90

      - name: Upload JSON artifact
        if: ${{ github.event.inputs.output_format == 'json' }}
        uses: actions/upload-artifact@v4
        with:
          name: changelog-json-${{ github.run_id }}
          path: changelog.json
          retention-days: 90

      - name: Write job summary
        run: |
          FROM="${{ steps.refs.outputs.from }}"
          TO="${{ steps.refs.outputs.to }}"
          TOTAL=$(git rev-list --count "${FROM}..${TO}")
          {
            echo "## ✅ Changelog generated successfully"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Format | \`${{ github.event.inputs.output_format }}\` |"
            echo "| From | \`${FROM:0:7}\` |"
            echo "| To | \`${TO:0:7}\` |"
            echo "| Total commits | **${TOTAL}** |"
          } >> $GITHUB_STEP_SUMMARY
